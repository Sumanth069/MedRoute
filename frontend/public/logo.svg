<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1527;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#05070f;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="4"/>
  <!-- Glowing paths representing routes -->
  <path d="M 120,256 C 200,200 300,320 392,256" fill="none" stroke="url(#grad)" stroke-width="12" stroke-linecap="round" opacity="0.4" />
  <path d="M 120,320 C 220,400 280,180 392,200" fill="none" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" opacity="0.3" />
  <!-- Medical cross in shield -->
  <g transform="translate(196, 176)" filter="url(#glow)">
    <!-- Shield Outline -->
    <path d="M 60,0 C 100,0 120,20 120,60 C 120,110 60,150 60,150 C 60,150 0,110 0,60 C 0,20 20,0 60,0 Z" fill="url(#grad)" />
    <!-- White cross inside -->
    <path d="M 50,35 H 70 V 55 H 90 V 75 H 70 V 95 H 50 V 75 H 30 V 55 H 50 Z" fill="#ffffff" />
  </g>
</svg>
